function getFilteredProducts(category) {
    const keys = Object.keys(productDatabase);
    
    if (category === "Bakso") {
        return keys.filter(name => name.toLowerCase().includes("bakso"));
    } else if (category === "Naget") {
        return keys.filter(name => name.toLowerCase().includes("naget") || name.toLowerCase().includes("crunch"));
    } else if (category === "Sosis") {
        return keys.filter(name => name.toLowerCase().includes("sosis") || name.toLowerCase().includes("bakar") || name.toLowerCase().includes("bratwurst") || name.toLowerCase().includes("cocktail") || name.toLowerCase().includes("breakfast"));
    } else if (category === "Olahan Ikan") {
        return keys.filter(name => name.toLowerCase().includes("dumpling") || name.toLowerCase().includes("otak") || name.toLowerCase().includes("fishroll") || name.toLowerCase().includes("scallop"));
    } else if (category === "Lainnya") {
        return keys.filter(name => {
            const n = name.toLowerCase();
            return !n.includes("bakso") && !n.includes("naget") && !n.includes("crunch") && 
                   !n.includes("sosis") && !n.includes("bakar") && !n.includes("bratwurst") && 
                   !n.includes("cocktail") && !n.includes("breakfast") && !n.includes("dumpling") && 
                   !n.includes("otak") && !n.includes("fishroll") && !n.includes("scallop");
        });
    }
    return [];
}

function onCategoryChange() {
    const catSelect = document.getElementById("categorySelect");
    const prodSelect = document.getElementById("productSelect");
    const selectedCategory = catSelect.value;
    
    if (!selectedCategory) {
        prodSelect.innerHTML = '<option value="">-- Pilih Item --</option>';
        prodSelect.disabled = true;
        document.getElementById("tableBody").innerHTML = `
            <tr>
                <td colspan="8" class="empty-placeholder">Silahkan tentukan Kategori Produk pada kolom <b>Item</b> terlebih dahulu.</td>
            </tr>`;
        return;
    }
    
    const filteredItems = getFilteredProducts(selectedCategory);
    
    let options = '<option value="">-- Semua Item ' + selectedCategory + ' --</option>';
    filteredItems.forEach(name => {
        options += `<option value="${name}">${name}</option>`;
    });
    prodSelect.innerHTML = options;
    prodSelect.disabled = false;
    
    renderTable(filteredItems);
}

function renderTable(itemList, highlightItem = "") {
    const tBody = document.getElementById("tableBody");
    
    if (itemList.length === 0) {
        tBody.innerHTML = `<tr><td colspan="8" class="empty-placeholder">Tidak ada data produk.</td></tr>`;
        return;
    }
    
    let rowsHtml = "";
    itemList.forEach(name => {
        const item = productDatabase[name];
        const isHighlight = (name === highlightItem) ? "class='highlighted-row'" : "";
        
        rowsHtml += `
            <tr ${isHighlight} id="row-${btoa(name).replace(/=/g, "")}">
                <td class="text-left">${name}</td>
                <td>${item.batch_besar}</td>
                <td>${item.batch_kecil}</td>
                <td>${item.kg_batch_kecil}</td>
                <td>${item.konversi}</td>
                <td>${item.berat_ctn}</td>
                <td>${item.pack_ctn}</td>
                <td>${item.vacuum}</td>
            </tr>
        `;
    });
    
    tBody.innerHTML = rowsHtml;

    if (highlightItem) {
        const targetId = "row-" + btoa(highlightItem).replace(/=/g, "");
        const targetRow = document.getElementById(targetId);
        if (targetRow) {
            targetRow.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }
}

function onProductChange() {
    const catSelect = document.getElementById("categorySelect");
    const prodSelect = document.getElementById("productSelect");
    
    const selectedCategory = catSelect.value;
    const selectedProduct = prodSelect.value;
    const filteredItems = getFilteredProducts(selectedCategory);
    
    renderTable(filteredItems, selectedProduct);
}
