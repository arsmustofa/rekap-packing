<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rekap Packing Generator</title>
  <style>
    /* Mengatur box-sizing agar padding tidak merusak ukuran lebar elemen */
    * { box-sizing: border-box; }
    
    body { font-family: Arial, sans-serif; margin: 15px; background: #f8f9fa; }
    .container { max-width: 750px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    h1 { text-align: center; color: #2c3e50; font-size: 22px; margin-top: 5px; margin-bottom: 20px; }
    
    input, select, button { padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ccc; }
    input, select { width: 100%; height: 40px; }
    button { background: #27ae60; color: white; font-weight: bold; cursor: pointer; border: none; text-align: center; width: 100%; }
    button:hover { background: #219653; }
    
    /* Style untuk tombol hapus */
    .btn-delete { background: #c0392b; }
    .btn-delete:hover { background: #962d22; }
    
    /* Container untuk membungkus tombol tambah dan hapus agar sejajar */
    .action-buttons { display: flex; gap: 8px; margin-top: 5px; }
    
    textarea { width: 100%; height: 260px; font-family: monospace; font-size: 15px; margin-top: 10px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; box-sizing: border-box; transition: background-color 0.5s ease; }
    
    /* Efek Highlight Kuning Lembut saat Selesai Generate */
    .highlight-flash {
      background-color: #fff9c4 !important;
    }
    
    /* Layout Info Atas (Tanggal, Shift, Grup) */
    .header-grid { 
      display: grid; 
      grid-template-columns: 2fr 1fr 1fr;
      gap: 10px; 
      margin-bottom: 15px;
      align-items: flex-end;
    }
    .grid-col { display: flex; flex-direction: column; }
    .grid-col label { font-size: 13px; font-weight: bold; color: #333; margin-bottom: 2px; }
    .header-grid select { margin: 0; width: 100%; }
    .header-grid input { margin: 0; }
    
    /* Container Responsif untuk Scrollbar Horizontal jika layar sempit */
    .items-container {
      width: 100%;
      overflow-x: auto;
      margin-bottom: 10px;
      border: 1px solid #eee;
      border-radius: 6px;
      padding: 10px;
      background: #fafafa;
    }

    /* Memastikan area di dalam scrollbar memiliki ruang yang cukup dan tidak menciut */
    #items-wrapper {
      min-width: 680px; 
    }

    /* Layout Header Label & Baris Input menggunakan Grid yang sama agar PASTI SENTER */
    .item-grid-layout {
      display: grid;
      grid-template-columns: 220px 140px 110px 1fr;
      gap: 10px;
      align-items: center;
    }

    .item-header {
      margin-bottom: 8px;
      padding: 0 10px;
    }
    .item-header div {
      font-size: 13px;
      font-weight: bold;
      color: #333;
      text-align: center;
    }

    /* Layout Blok Item Packing */
    .item-block { 
      background: #fdfdfd;
      border: 1px solid #e2e8f0;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    
    /* Kolom Kiri: Nama Item */
    .col-nama { display: flex; flex-direction: column; }
    .col-nama select { margin: 0; width: 100%; }
    .col-nama input[type="text"] { margin-top: 5px; margin-bottom: 0; width: 100%; }
    
    /* Kolom Tengah: Dropdown Mesin */
    .col-mesin select { margin: 0; width: 100%; }

    /* Kolom Tambahan: Input Total Transfer (Ctn) */
    .col-ctn input[type="number"] { margin: 0; text-align: center; width: 100%; }

    /* Kolom Kanan: Input Range Number */
    .col-range { display: flex; align-items: center; gap: 5px; white-space: nowrap; }
    .col-range input[type="text"] { margin: 0; text-align: center; width: 100%; }
    .col-range span { font-weight: bold; color: #555; }

    /* Style untuk watermark/credit di bawah */
    .footer-credit {
      text-align: center;
      font-size: 11px;
      color: #95a5a6;
      margin-top: 270px;
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📦 Hasil Packing Line-4</h1>
    
    <div class="header-grid">
      <div class="grid-col">
        <label>Tanggal</label>
        <input type="date" id="tanggal">
      </div>
      <div class="grid-col">
        <label>Shift</label>
        <select id="shift">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
        </select>
      </div>
      <div class="grid-col">
        <label>Grup</label>
        <select id="grup">
          <option value="A">A</option>
          <option value="B">B</option>
          <option value="C">C</option>
        </select>
      </div>
    </div>

    <h3 style="margin-top: 20px; font-size: 16px; margin-bottom: 10px;">📝 Input Item Packing</h3>
    
    <div class="items-container">
      <div id="items-wrapper">
        <div class="item-header item-grid-layout">
          <div>Nama Produk</div>
          <div>Mesin</div>
          <div>Total Transfer</div>
          <div>No.Batch</div>
        </div>
        <div id="items"></div>
      </div>
    </div>
    
    <div class="action-buttons">
      <button onclick="addItem()" style="font-size: 13px; padding: 8px 12px; width: auto;">+ Tambah Item</button>
      <button onclick="removeItem()" class="btn-delete" style="font-size: 13px; padding: 8px 12px; width: auto;">- Hapus Item</button>
    </div>

    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
    <button onclick="generateRekap()" style="font-size: 16px; padding: 12px;">Rekap</button>

    <!-- id="section-hasil" ditambahkan untuk target scroll halaman -->
    <h3 id="section-hasil" style="margin-top: 20px; font-size: 16px; margin-bottom: 10px;">Hasil Rekap (Siap Copy ke WA)</h3>
    <textarea id="output" readonly placeholder="Hasil rekap akan muncul di sini..."></textarea>
    <button onclick="copyToClipboard()" style="margin-top: 10px;">📋 Copy ke Clipboard</button>
    
    <div class="footer-credit">create by: @ars.mustofa</div>
  </div>

  <script>
    let itemCount = 0;

    // Fungsi pembantu untuk otomatis mengubah angka biasa menjadi format 3 digit (ex: 2 -> 002)
    function formatThreeDigits(inputElement) {
      let value = inputElement.value.trim();
      if (value !== "" && !isNaN(value)) {
        inputElement.value = String(value).padStart(3, '0');
      }
    }

    function addItem() {
      itemCount++;
      const div = document.createElement('div');
      div.className = 'item-block';
      div.id = `itemRow${itemCount}`;
      div.innerHTML = `
        <div class="item-grid-layout">
          <div class="col-nama">
            <select id="namaSelect${itemCount}" onchange="toggleCustomInput(${itemCount})">
              <option value="" disabled selected>-- Pilih Item --</option>
              <option value="Salam Bakso Ayam 500gr">Salam Bakso Ayam 500gr</option>
              <option value="Salam Bakso Kerikil 500gr">Salam Bakso Kerikil 500gr</option>
              <option value="Salam Bakso Sapi 500gr">Salam Bakso Sapi 500gr</option>
              <option value="Salam Bakso Jumbo 700gr">Salam Bakso Jumbo 700gr</option>
              <option value="Kamil Bakso Sapi 250gr">Kamil Bakso Sapi 250gr</option>
              <option value="Kamil Bakso Sapi 500gr">Kamil Bakso Sapi 500gr</option>
              <option value="Kamil Bakso Sapi 750gr">Kamil Bakso Sapi 750gr</option>
              <option value="CUSTOM">Prodak lain</option>
            </select>
            <input type="text" id="namaCustom${itemCount}" placeholder="Ketik nama prodak" style="display: none;">
          </div>
          
          <div class="col-mesin">
            <select id="mesinSelect${itemCount}">
              <option value="" disabled selected>-- pilih mesin --</option>
              <option value="MHW-3">MHW-3</option>
              <option value="MHW-4">MHW-4</option>
              <option value="MHC">MHC</option>
              <option value="Manual">Manual</option>
            </select>
          </div>

          <div class="col-ctn">
            <input type="number" id="ctnInput${itemCount}" placeholder="ctn" min="0">
          </div>

          <div class="col-range">
            <input type="text" id="numStart${itemCount}" placeholder="000" inputmode="numeric" onblur="formatThreeDigits(this)">
            <span>-</span>
            <input type="text" id="numEnd${itemCount}" placeholder="000" inputmode="numeric" onblur="formatThreeDigits(this)">
          </div>
        </div>
      `;
      document.getElementById('items').appendChild(div);
    }

    function toggleCustomInput(id) {
      const selectElement = document.getElementById(`namaSelect${id}`);
      const customInputElement = document.getElementById(`namaCustom${id}`);
      
      if (selectElement && customInputElement) {
        if (selectElement.value === "CUSTOM") {
          customInputElement.style.display = "block";
          customInputElement.focus();
        } else {
          customInputElement.style.display = "none";
          customInputElement.value = "";
        }
      }
    }

    function removeItem() {
      if (itemCount > 0) {
        const lastItem = document.getElementById(`itemRow${itemCount}`);
        if (lastItem) {
          lastItem.remove();
          itemCount--;
        }
      } else {
        alert('⚠️ Tidak ada item yang bisa dihapus!');
      }
    }

    function generateRekap() {
      // Header format baru sesuai contoh pesanan
      let rekap = `*Hasil packing:*\n══════════\n`;
      let grandTotalCtn = 0; // Menampung jumlah total seluruh carton
      
      // Object untuk menampung pengelompokkan data berdasarkan nama produk
      let groupedItems = {};

      for (let i = 1; i <= itemCount + 100; i++) { 
        const selectElement = document.getElementById(`namaSelect${i}`);
        const customInputElement = document.getElementById(`namaCustom${i}`);
        const ctnElement = document.getElementById(`ctnInput${i}`);
        const numStartElement = document.getElementById(`numStart${i}`);
        const numEndElement = document.getElementById(`numEnd${i}`);

        if (selectElement && ctnElement && numStartElement && numEndElement) {
          let nama = (selectElement.value === "CUSTOM") ? (customInputElement ? customInputElement.value.trim() : "") : selectElement.value;
          let ctn = ctnElement.value.trim();
          let startVal = numStartElement.value.trim();
          let endVal = numEndElement.value.trim();

          if (nama && ctn !== "" && startVal !== "" && endVal !== "") {
            let startNum = parseInt(startVal, 10);
            let endNum = parseInt(endVal, 10);
            let totalCtn = parseInt(ctn, 10);
            
            // Rumus hitung jumlah batch: (Akhir - Awal) + 1
            let totalBatch = (endNum - startNum) + 1;
            if (totalBatch < 0) totalBatch = 0; // Validasi jika input terbalik

            // Jika nama produk sudah ada di object, akumulasikan nilai ctn dan batch-nya
            if (groupedItems[nama]) {
              groupedItems[nama].ctn += totalCtn;
              groupedItems[nama].batch += totalBatch;
            } else {
              // Jika belum ada, buat penampung baru
              groupedItems[nama] = {
                ctn: totalCtn,
                batch: totalBatch
              };
            }
            
            grandTotalCtn += totalCtn;
          }
        }
      }

      // Periksa apakah ada data produk yang masuk
      let keys = Object.keys(groupedItems);
      if (keys.length > 0) {
        let lineNomor = 1;
        for (let namaProduk in groupedItems) {
          let itemData = groupedItems[namaProduk];
          // Format angka ctn dengan pemisah ribuan berupa titik (id-ID)
          let formattedCtn = itemData.ctn.toLocaleString('id-ID');
          
          // Susun baris teks gabungan produk tanpa memperdulikan perbedaan mesin
          rekap += `${lineNomor}. ${namaProduk} : ${formattedCtn} ctn (${itemData.batch}#)\n`;
          lineNomor++;
        }
        
        let formattedGrandTotal = grandTotalCtn.toLocaleString('id-ID');
        rekap += `\nTotal : ${formattedGrandTotal} ctn\n\nCc Bu. @`;
      } else {
        rekap += `(Belum ada data item yang lengkap isi pilihannya)\n\nCc Bu. @`;
      }

      const outputField = document.getElementById('output');
      outputField.value = rekap;

      // === FITUR TAMBAHAN BARU ===
      // 1. Geser layar otomatis secara halus (smooth) menuju judul area hasil rekap
      document.getElementById('section-hasil').scrollIntoView({ behavior: 'smooth', block: 'start' });

      // 2. Memberikan efek highlight kedip warna kuning agar pengguna sadar hasilnya sudah berubah
      outputField.classList.add('highlight-flash');
      setTimeout(() => {
        outputField.classList.remove('highlight-flash');
      }, 800); // warna kuning hilang perlahan dalam 0.8 detik kembali ke putih biasa
    }

    function copyToClipboard() {
      const output = document.getElementById('output');
      if (!output.value) {
        alert('❌ Belum ada data rekap yang di-generate!');
        return;
      }
      output.select();
      output.setSelectionRange(0, 99999);
      document.execCommand('copy');
      alert('✅ Berhasil dicopy! Langsung paste ke grup WA.');
    }

    window.onload = () => {
      const tglInput = document.getElementById('tanggal');
      if (tglInput) {
        const hariIni = new Date();
        const tahun = hariIni.getFullYear();
        const bulan = String(hariIni.getMonth() + 1).padStart(2, '0');
        const tanggal = String(hariIni.getDate()).padStart(2, '0');
        tglInput.value = `${tahun}-${bulan}-${tanggal}`;
      }

      addItem();
      addItem();
      addItem();
      addItem();
    };
  </script>
</body>
</html>
